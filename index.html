<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TechWave Navbar</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#140326]">

  <!-- Navbar -->
  <header class="flex items-center justify-between px-10 py-5">
    
    <!-- Logo -->
    <h1 class="text-3xl font-bold text-white">
      Tech<span class="text-pink-500">Wave</span>
    </h1>

    <!-- Menu -->
    <nav class="hidden md:flex gap-8 text-gray-300 text-lg">
      <a href="#" class="hover:text-white transition">About</a>
      <a href="#" class="hover:text-white transition">Episodes</a>
      <a href="#" class="hover:text-white transition">Host</a>
    </nav>

    <!-- Button -->
    <button class="bg-gradient-to-r from-yellow-400 via-pink-500 to-purple-600 text-white px-6 py-2 rounded-full font-medium shadow-lg hover:opacity-90 transition">
      Subscribe →
    </button>

  </header>

</body>
</html>
